name: Performance Logger

on:
  workflow_dispatch:
    inputs:
      run_date:
        description: Australia/Sydney date override in YYYY-MM-DD format
        required: false
        type: string
      dry_run:
        description: Generate output without pushing a branch or opening a PR
        required: false
        default: false
        type: boolean
  schedule:
    # Sunday 20:00 Australia/Sydney across AEDT/AEST.
    - cron: '0 9,10 * * 0'

permissions:
  contents: write
  pull-requests: write

jobs:
  performance_logger:
    runs-on: ubuntu-latest
    concurrency:
      group: performance-logger
      cancel-in-progress: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Gate Australia/Sydney run window
        id: gate
        run: node scripts/automation/check-window.mjs --weekday sunday --hour 20 --grace-hours 1
        env:
          AUTOMATION_RUN_DATE: ${{ github.event.inputs.run_date }}
          AUTOMATION_DRY_RUN: ${{ github.event.inputs.dry_run }}

      - name: Setup pnpm
        if: ${{ steps.gate.outputs.should_run == 'true' || github.event_name == 'workflow_dispatch' }}
        uses: pnpm/action-setup@v5
        with:
          version: 10.23.0

      - name: Setup Node.js
        if: ${{ steps.gate.outputs.should_run == 'true' || github.event_name == 'workflow_dispatch' }}
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        if: ${{ steps.gate.outputs.should_run == 'true' || github.event_name == 'workflow_dispatch' }}
        run: pnpm install --frozen-lockfile

      - name: Run performance logger automation
        if: ${{ steps.gate.outputs.should_run == 'true' || github.event_name == 'workflow_dispatch' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BEEHIIV_API_KEY: ${{ secrets.BEEHIIV_API_KEY }}
          BEEHIIV_PUBLICATION_ID: ${{ secrets.BEEHIIV_PUBLICATION_ID }}
          AUTOMATION_RUN_DATE: ${{ github.event.inputs.run_date }}
          AUTOMATION_DRY_RUN: ${{ github.event.inputs.dry_run }}
        run: node scripts/automation/run-performance-logger.mjs
